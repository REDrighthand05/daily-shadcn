# Tauri v2 release workflow — builds on Windows runner via Rust + WebView2, auto-publishes to GitHub Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Sync version from tag (Cargo.toml + tauri.conf.json)
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          (Get-Content src-tauri/tauri.conf.json) -replace '"version": ".*?"', "`"version`": `"$ver`"" | Set-Content src-tauri/tauri.conf.json
          (Get-Content src-tauri/Cargo.toml) -replace '^version = ".*?"', "version = `"$ver`"" | Set-Content src-tauri/Cargo.toml

      - run: npm ci --legacy-peer-deps

      - run: rustup update stable && rustup default stable

      - run: npm install -g @tauri-apps/cli@^2

      - run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
